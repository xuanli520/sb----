services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-443}:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - edge
      - application
      - object-storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O /dev/null https://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TZ: Asia/Shanghai
      NOVEL_INTERNAL_API_KEY: ${NOVEL_INTERNAL_API_KEY:?NOVEL_INTERNAL_API_KEY is required}
      # D-05 is backend-only; each rejection persists the resulting retry timestamp.
      NOVEL_AUTHOR_APPLICATION_REJECTION_COOLDOWN: ${NOVEL_AUTHOR_APPLICATION_REJECTION_COOLDOWN:-P7D}
      # Email registration uses a real third-party SMTP provider only. These are intentionally
      # backend-only; incomplete values make email verification return 503 rather than simulate
      # delivery. For QQ Mail, use its separately issued SMTP authorization code as the password.
      NOVEL_EMAIL_VERIFICATION_ENABLED: ${NOVEL_EMAIL_VERIFICATION_ENABLED:-true}
      NOVEL_EMAIL_VERIFICATION_FROM: ${NOVEL_EMAIL_VERIFICATION_FROM:-}
      NOVEL_EMAIL_VERIFICATION_HASH_SECRET: ${NOVEL_EMAIL_VERIFICATION_HASH_SECRET:-}
      NOVEL_EMAIL_SETTINGS_ENCRYPTION_KEY: ${NOVEL_EMAIL_SETTINGS_ENCRYPTION_KEY:-}
      NOVEL_EMAIL_VERIFICATION_CODE_TTL: ${NOVEL_EMAIL_VERIFICATION_CODE_TTL:-PT10M}
      NOVEL_EMAIL_VERIFICATION_RESEND_COOLDOWN: ${NOVEL_EMAIL_VERIFICATION_RESEND_COOLDOWN:-PT60S}
      NOVEL_EMAIL_VERIFICATION_MAX_REQUESTS_PER_WINDOW: ${NOVEL_EMAIL_VERIFICATION_MAX_REQUESTS_PER_WINDOW:-5}
      NOVEL_EMAIL_VERIFICATION_REQUEST_WINDOW: ${NOVEL_EMAIL_VERIFICATION_REQUEST_WINDOW:-PT1H}
      NOVEL_EMAIL_VERIFICATION_MAX_VERIFICATION_ATTEMPTS: ${NOVEL_EMAIL_VERIFICATION_MAX_VERIFICATION_ATTEMPTS:-5}
      NOVEL_SMTP_HOST: ${NOVEL_SMTP_HOST:-}
      NOVEL_SMTP_PORT: ${NOVEL_SMTP_PORT:-465}
      NOVEL_SMTP_USERNAME: ${NOVEL_SMTP_USERNAME:-}
      NOVEL_SMTP_PASSWORD: ${NOVEL_SMTP_PASSWORD:-}
      NOVEL_SMTP_AUTH: ${NOVEL_SMTP_AUTH:-true}
      NOVEL_SMTP_AUTH_MECHANISMS: ${NOVEL_SMTP_AUTH_MECHANISMS:-LOGIN}
      NOVEL_SMTP_SSL_ENABLE: ${NOVEL_SMTP_SSL_ENABLE:-true}
      NOVEL_SMTP_CONNECTION_TIMEOUT_MILLIS: ${NOVEL_SMTP_CONNECTION_TIMEOUT_MILLIS:-5000}
      NOVEL_SMTP_TIMEOUT_MILLIS: ${NOVEL_SMTP_TIMEOUT_MILLIS:-10000}
      NOVEL_SMTP_WRITE_TIMEOUT_MILLIS: ${NOVEL_SMTP_WRITE_TIMEOUT_MILLIS:-10000}
      # Optional first production administrator. These three values must be supplied together;
      # blank values intentionally leave bootstrap disabled.
      NOVEL_BOOTSTRAP_ADMIN_USERNAME: ${NOVEL_BOOTSTRAP_ADMIN_USERNAME:-}
      NOVEL_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${NOVEL_BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
      NOVEL_BOOTSTRAP_ADMIN_PASSWORD: ${NOVEL_BOOTSTRAP_ADMIN_PASSWORD:-}
      # Qwen is backend-only and disabled by default. Supply all provider values through the
      # deployment environment when enabling it; no model credential is passed to the web service.
      NOVEL_RUNTIME_MODE: ${NOVEL_RUNTIME_MODE:-PRODUCTION}
      NOVEL_AUDIT_DEVELOPMENT_SIMULATION_ENABLED: ${NOVEL_AUDIT_DEVELOPMENT_SIMULATION_ENABLED:-false}
      QWEN_AUDIT_ENABLED: ${QWEN_AUDIT_ENABLED:-false}
      QWEN_AUDIT_BASE_URL: ${QWEN_AUDIT_BASE_URL:-}
      QWEN_AUDIT_MODEL: ${QWEN_AUDIT_MODEL:-}
      QWEN_AUDIT_TIMEOUT: ${QWEN_AUDIT_TIMEOUT:-PT20S}
      QWEN_AUDIT_MAX_RETRIES: ${QWEN_AUDIT_MAX_RETRIES:-0}
      QWEN_AUDIT_MAX_REQUESTS_PER_MINUTE: ${QWEN_AUDIT_MAX_REQUESTS_PER_MINUTE:-60}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # Storage credentials are server-only. The browser receives only relative /media URLs.
      NOVEL_COVER_STORAGE_ENABLED: ${NOVEL_COVER_STORAGE_ENABLED:-false}
      NOVEL_COVER_STORAGE_ENDPOINT: http://minio:9000
      NOVEL_COVER_STORAGE_ACCESS_KEY: ${MINIO_COVER_ACCESS_KEY:?MINIO_COVER_ACCESS_KEY is required}
      NOVEL_COVER_STORAGE_SECRET_KEY: ${MINIO_COVER_SECRET_KEY:?MINIO_COVER_SECRET_KEY is required}
      NOVEL_COVER_STORAGE_BUCKET: novel-covers
      NOVEL_COVER_STORAGE_PUBLIC_BASE_PATH: /media
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/novel_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: novel
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - application
      - mysql
      - object-storage
      # SMTP delivery is an outbound backend-only dependency. This network has no published
      # ports and is intentionally the sole non-internal network attached to the backend.
      - smtp-egress
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://127.0.0.1:8080/actuator/health/readiness > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        API_PROXY_TARGET: http://backend:8080
    environment:
      API_PROXY_TARGET: http://backend:8080
      NOVEL_INTERNAL_API_KEY: ${NOVEL_INTERNAL_API_KEY:?NOVEL_INTERNAL_API_KEY is required}
      # Browser cookies contain only opaque IDs. The mapping to the backend credential is shared
      # by all web replicas through Redis; process-local memory is never enabled in production.
      NOVEL_SESSION_STORE: redis
      NOVEL_SESSION_REDIS_URL: ${NOVEL_SESSION_REDIS_URL:-redis://redis:6379/0}
      NOVEL_SESSION_REDIS_PREFIX: ${NOVEL_SESSION_REDIS_PREFIX:-novel:bff:session:}
      NOVEL_SESSION_TTL_SECONDS: ${NOVEL_SESSION_TTL_SECONDS:-28800}
      # Auth POSTs use independent Redis keys and fail closed rather than bypassing anti-abuse
      # protection. The URL defaults to the session Redis service when not overridden.
      NOVEL_AUTH_RATE_LIMIT_ENABLED: ${NOVEL_AUTH_RATE_LIMIT_ENABLED:-true}
      NOVEL_AUTH_RATE_LIMIT_REDIS_URL: ${NOVEL_AUTH_RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      NOVEL_AUTH_RATE_LIMIT_REDIS_PREFIX: ${NOVEL_AUTH_RATE_LIMIT_REDIS_PREFIX:-novel:bff:auth-rate-limit:}
      NOVEL_AUTH_RATE_LIMIT_LOGIN_LIMIT: ${NOVEL_AUTH_RATE_LIMIT_LOGIN_LIMIT:-10}
      NOVEL_AUTH_RATE_LIMIT_REGISTER_LIMIT: ${NOVEL_AUTH_RATE_LIMIT_REGISTER_LIMIT:-5}
      NOVEL_AUTH_RATE_LIMIT_WINDOW_SECONDS: ${NOVEL_AUTH_RATE_LIMIT_WINDOW_SECONDS:-900}
      # Keep false unless a trusted ingress overwrites X-Forwarded-For for every request.
      NOVEL_AUTH_RATE_LIMIT_TRUSTED_PROXY_HEADERS: ${NOVEL_AUTH_RATE_LIMIT_TRUSTED_PROXY_HEADERS:-false}
      NOVEL_PUBLIC_ORIGIN: ${NOVEL_PUBLIC_ORIGIN:?NOVEL_PUBLIC_ORIGIN is required}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - application
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: novel_platform
      MYSQL_USER: novel
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BROWSER: "off"
    volumes:
      - minio-data:/data
    networks:
      - object-storage
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:9000/minio/health/live > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # This job is never exposed outside the internal object-storage network. It gives the backend a
  # narrow writer identity and gives Nginx's private upstream path anonymous GET access only.
  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_COVER_ACCESS_KEY: ${MINIO_COVER_ACCESS_KEY:?MINIO_COVER_ACCESS_KEY is required}
      MINIO_COVER_SECRET_KEY: ${MINIO_COVER_SECRET_KEY:?MINIO_COVER_SECRET_KEY is required}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/novel-covers
        mc anonymous set download local/novel-covers
        if user_add_error="$$(mc admin user add local "$$MINIO_COVER_ACCESS_KEY" "$$MINIO_COVER_SECRET_KEY" 2>&1)"; then
          :
        else
          case "$$user_add_error" in
            *"already exists"*|*"already in use"*) ;;
            *) printf '%s\n' "Could not create MinIO cover writer: $$user_add_error" >&2; exit 1 ;;
          esac
        fi
        printf '%s' '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetObject","s3:PutObject","s3:DeleteObject"],"Resource":["arn:aws:s3:::novel-covers/covers/*"]}]}' > /tmp/novel-cover-writer-policy.json
        mc admin policy create local novel-cover-writer /tmp/novel-cover-writer-policy.json || mc admin policy update local novel-cover-writer /tmp/novel-cover-writer-policy.json
        mc admin policy attach local novel-cover-writer --user "$$MINIO_COVER_ACCESS_KEY"
        # A pre-existing access key can have a different secret. Verify the configured writer
        # can use its final narrow policy instead of treating that condition as success.
        mc alias set cover-writer http://minio:9000 "$$MINIO_COVER_ACCESS_KEY" "$$MINIO_COVER_SECRET_KEY"
        printf '%s' minio-init-writer-check > /tmp/minio-cover-writer-check
        mc cp /tmp/minio-cover-writer-check cover-writer/novel-covers/covers/.minio-init-writer-check
        mc rm --force cover-writer/novel-covers/covers/.minio-init-writer-check
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - object-storage
    restart: "no"
volumes:
  mysql-data:
  redis-data:
  minio-data:

networks:
  edge:
  application:
    internal: true
  mysql:
    internal: true
  redis:
    internal: true
  object-storage:
    internal: true
  smtp-egress:
