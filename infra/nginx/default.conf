map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Nginx is reachable only through the host Caddy listener in production. Preserve
# Caddy's external HTTPS context for the BFF instead of replacing it with this
# internal HTTP hop.
map $http_x_forwarded_proto $upstream_forwarded_proto {
  default $http_x_forwarded_proto;
  '' $scheme;
}

map $http_x_forwarded_host $upstream_forwarded_host {
  default $http_x_forwarded_host;
  '' $host;
}

server {
  listen 80;
  server_name _;
  server_tokens off;
  # The application validates decoded image bytes at 5 MiB. Allow multipart
  # boundaries through this transport guard so a legal 5 MiB file is not 413.
  client_max_body_size 6m;

  # Caddy is the public entry point; this listener is its loopback HTTP upstream.
  location = /nginx-health {
    access_log off;
    add_header Cache-Control "no-store" always;
    return 204;
  }

  # Immutable cover and carousel-banner objects live in a private MinIO network.
  # Only generated UUID PNG/JPEG keys are public; every other /media path is rejected.
  # Browser credentials and forwarded identity headers are stripped before the anonymous GET.
  location ~ "^/media/(?:covers|banners)/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\.(?:png|jpg)$" {
    if ($request_method != GET) {
      return 405;
    }
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $minio_upstream minio:9000;
    rewrite "^/media/((?:covers|banners)/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\.(?:png|jpg))$" /novel-covers/$1 break;
    proxy_pass http://$minio_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host minio;
    proxy_set_header Authorization "";
    proxy_set_header Cookie "";
    proxy_set_header X-Real-IP "";
    proxy_set_header X-Forwarded-For "";
    proxy_set_header X-Forwarded-Host "";
    proxy_set_header X-Forwarded-Proto "";
    proxy_set_header X-Forwarded-User "";
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    add_header Cache-Control "public, max-age=86400, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location = /media { return 404; }
  location /media/ { return 404; }

  location / {
    # Docker's embedded DNS resolves service names at request time. A variable
    # avoids resolving `web` while Nginx validates this file outside Compose.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $web_upstream web:3000;
    proxy_pass http://$web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $upstream_forwarded_host;
    proxy_set_header X-Forwarded-Proto $upstream_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
