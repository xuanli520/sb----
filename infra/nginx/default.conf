map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;
  server_tokens off;

  # This listener is the sole public Compose entry point. TLS must terminate at a
  # managed ingress or a separately provisioned Nginx TLS configuration.
  location = /nginx-health {
    access_log off;
    add_header Cache-Control "no-store" always;
    return 204;
  }

  # Immutable cover objects live in a private MinIO network. This is the sole public media path;
  # browser credentials are stripped before the proxy and mutations are not forwarded.
  location ^~ /media/ {
    limit_except GET { deny all; }
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $minio_upstream minio:9000;
    rewrite ^/media/(.*)$ /novel-covers/$1 break;
    proxy_pass http://$minio_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host minio;
    proxy_set_header Authorization "";
    proxy_set_header Cookie "";
    proxy_set_header X-Real-IP "";
    proxy_set_header X-Forwarded-For "";
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    add_header Cache-Control "public, max-age=86400, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location / {
    # Docker's embedded DNS resolves service names at request time. A variable
    # avoids resolving `web` while Nginx validates this file outside Compose.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $web_upstream web:3000;
    proxy_pass http://$web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
