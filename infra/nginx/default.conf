map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;
  server_tokens off;

  # This listener is the sole public Compose entry point. TLS must terminate at a
  # managed ingress or a separately provisioned Nginx TLS configuration.
  location = /nginx-health {
    access_log off;
    add_header Cache-Control "no-store" always;
    return 204;
  }

  location / {
    # Docker's embedded DNS resolves service names at request time. A variable
    # avoids resolving `web` while Nginx validates this file outside Compose.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $web_upstream web:3000;
    proxy_pass http://$web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
