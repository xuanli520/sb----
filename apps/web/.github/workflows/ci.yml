name: Novel Frontend CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: novel-web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type check, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test

      - name: Production build
        run: npm run build

# Browser E2E is intentionally exercised by the root repository workflow, which
# starts the Spring backend and provides Chromium. This frontend repository alone
# cannot validate the authenticated BFF flow against a real service.
