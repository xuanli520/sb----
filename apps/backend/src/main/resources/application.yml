spring:
  application:
    name: novel-platform-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:novel_platform;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    # Keep Spring AI provider auto-configuration disabled. The dedicated Qwen moderation handle
    # below is created only when its own opt-in settings are complete.
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      chat:
        base-url: ${QWEN_AUDIT_BASE_URL:}
        api-key: ${DASHSCOPE_API_KEY:}
        model: ${QWEN_AUDIT_MODEL:}
        timeout: ${QWEN_AUDIT_TIMEOUT:PT20S}
        # Provider retries are disabled here. The moderation workflow fails closed and never
        # retries an arbitrary provider/schema failure by framework default.
        max-retries: ${QWEN_AUDIT_MAX_RETRIES:0}
  servlet:
    multipart:
      # The application performs its own byte and decoded-image checks below. These limits stop
      # the servlet container from accepting an arbitrarily large multipart request first.
      max-file-size: ${NOVEL_COVER_MAX_BYTES:5242880}
      max-request-size: ${NOVEL_COVER_MAX_BYTES:5242880}
server:
  port: ${SERVER_PORT:8080}
management:
  endpoints.web.exposure.include: health,info
  endpoint.health.probes.enabled: true
novel:
  # This is intentionally separate from Spring active profiles. Only explicit DEVELOPMENT or TEST
  # mode can allow the opt-in local moderation simulation.
  runtime-mode: ${NOVEL_RUNTIME_MODE:PRODUCTION}
  internal-api-key: ${NOVEL_INTERNAL_API_KEY:}
  # Production has no implicit administrator. Set all three deployment variables to create the
  # first account, or safely elevate an existing account whose password matches the configured
  # secret. Leaving all three unset is an intentional no-op.
  bootstrap-admin:
    username: ${NOVEL_BOOTSTRAP_ADMIN_USERNAME:}
    display-name: ${NOVEL_BOOTSTRAP_ADMIN_DISPLAY_NAME:}
    password: ${NOVEL_BOOTSTRAP_ADMIN_PASSWORD:}
  audit:
    qwen:
      enabled: ${QWEN_AUDIT_ENABLED:false}
      base-url: ${QWEN_AUDIT_BASE_URL:}
      model: ${QWEN_AUDIT_MODEL:}
      timeout: ${QWEN_AUDIT_TIMEOUT:PT20S}
      max-retries: ${QWEN_AUDIT_MAX_RETRIES:0}
      max-requests-per-minute: ${QWEN_AUDIT_MAX_REQUESTS_PER_MINUTE:60}
    moderation:
      policy-version: ${NOVEL_AUDIT_POLICY_VERSION:content-safety-v1}
      prompt-version: ${NOVEL_AUDIT_PROMPT_VERSION:qwen-chapter-json-v1}
      max-input-characters: ${NOVEL_AUDIT_MAX_INPUT_CHARACTERS:24000}
      max-response-characters: ${NOVEL_AUDIT_MAX_RESPONSE_CHARACTERS:4096}
      # This must be explicitly enabled only for local/test development. Production defaults to
      # fail closed when Qwen is unavailable or unconfigured.
      development-simulation-enabled: ${NOVEL_AUDIT_DEVELOPMENT_SIMULATION_ENABLED:false}
    full-book:
      # Submission only writes an immutable snapshot. A background worker claims bounded chunks
      # and calls Qwen after its database transaction has committed.
      max-chunk-characters: ${NOVEL_FULL_BOOK_AUDIT_MAX_CHUNK_CHARACTERS:12000}
      max-chunks: ${NOVEL_FULL_BOOK_AUDIT_MAX_CHUNKS:256}
      max-snapshot-characters: ${NOVEL_FULL_BOOK_AUDIT_MAX_SNAPSHOT_CHARACTERS:1000000}
      max-claims-per-run: ${NOVEL_FULL_BOOK_AUDIT_MAX_CLAIMS_PER_RUN:8}
      claim-lease: ${NOVEL_FULL_BOOK_AUDIT_CLAIM_LEASE:PT2M}
      scheduler-enabled: ${NOVEL_FULL_BOOK_AUDIT_SCHEDULER_ENABLED:true}
      fixed-delay: ${NOVEL_FULL_BOOK_AUDIT_FIXED_DELAY:PT15S}
      initial-delay: ${NOVEL_FULL_BOOK_AUDIT_INITIAL_DELAY:PT5S}
  scheduled-publication:
    enabled: ${NOVEL_SCHEDULED_PUBLICATION_ENABLED:true}
    fixed-delay: ${NOVEL_SCHEDULED_PUBLICATION_FIXED_DELAY:PT30S}
    initial-delay: ${NOVEL_SCHEDULED_PUBLICATION_INITIAL_DELAY:PT5S}
  cover-storage:
    # Cover upload is deliberately opt-in. An enabled but incomplete configuration remains
    # unavailable at the endpoint rather than letting the application fall back to local disk.
    enabled: ${NOVEL_COVER_STORAGE_ENABLED:false}
    endpoint: ${NOVEL_COVER_STORAGE_ENDPOINT:}
    access-key: ${NOVEL_COVER_STORAGE_ACCESS_KEY:}
    secret-key: ${NOVEL_COVER_STORAGE_SECRET_KEY:}
    bucket: ${NOVEL_COVER_STORAGE_BUCKET:novel-covers}
    public-base-path: ${NOVEL_COVER_STORAGE_PUBLIC_BASE_PATH:/media}
    max-bytes: ${NOVEL_COVER_MAX_BYTES:5242880}
    max-width: ${NOVEL_COVER_MAX_WIDTH:4096}
    max-height: ${NOVEL_COVER_MAX_HEIGHT:4096}
